<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Solar Flare Archive Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c17;--surf:#0b1120;--surf2:#0f1829;
  --bdr:#172034;--bdr2:#1e2d47;
  --txt:#c9d9f0;--muted:#4a6280;
  --acc:#f97316;--acc2:#fbbf24;
  --cx:#ef4444;--cm:#fb923c;--cc:#fbbf24;--cb:#4ade80;--ca:#22d3ee;
  --mono:'Courier New','Menlo','Monaco',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
button{cursor:pointer;font-family:inherit;transition:all .15s}
select{font-family:inherit;-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surf)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── UPLOAD ── */
#upload{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:24px}
.ut{text-align:center}.ut .sun{font-size:52px;filter:drop-shadow(0 0 20px rgba(249,115,22,.5))}
.ut h1{font-size:28px;font-weight:700;color:var(--acc);margin-top:10px;letter-spacing:-1px}
.ut p{color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:6px;letter-spacing:1px}
.dz{background:var(--surf);border:2px dashed var(--bdr2);border-radius:12px;padding:44px 28px;text-align:center;cursor:pointer;width:100%;max-width:460px;transition:border-color .2s}
.dz:hover,.dz.over{border-color:var(--acc)}
.dz h2{font-size:15px;font-weight:600;margin-top:10px}.dz p{color:var(--muted);font-size:12px;margin-top:6px}
.hint{color:var(--muted);font-size:11px;font-family:var(--mono);text-align:center;max-width:400px;line-height:1.8;opacity:.8}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:8px 16px;border-radius:8px;font-size:12px;margin-top:10px}

/* ── MAIN ── */
#main{display:none;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
#hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.htitle{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;-webkit-user-select:none}
.htitle:hover .htitletxt h1{color:var(--acc2)}
.htitletxt h1{font-size:17px;font-weight:700;color:var(--acc);letter-spacing:-.5px;line-height:1;transition:color .15s}
.hsub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:3px}
.hctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── STATS BAR ── */
#sbar{display:flex;overflow-x:auto;border-bottom:1px solid var(--bdr)}
.sc{flex:0 0 auto;padding:8px 16px;border-right:1px solid var(--bdr)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--mono)}
.sv{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:2px;white-space:nowrap}

/* ── TABS ── */
#tabs{display:flex;gap:2px;padding:8px 20px 0;border-bottom:1px solid var(--bdr2);overflow-x:auto;background:var(--bg)}
.tb{padding:8px 16px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--muted);font-size:13px;white-space:nowrap;min-height:36px}
.tb.on{background:var(--surf);color:var(--txt);border-color:var(--bdr2);font-weight:600;margin-bottom:-1px;position:relative}

/* ── CONTENT ── */
#cnt{padding:18px;flex:1;overflow-y:auto;max-width:1200px;width:100%;margin:0 auto}

/* ── CARDS ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;margin-bottom:14px}
.ctit{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);margin-bottom:12px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.g2{grid-template-columns:1fr}}
.s2{grid-column:1/-1}

/* ── TABLE ── */
.dt{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
.dt th{padding:7px 11px;text-align:left;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bdr2);font-weight:500;white-space:nowrap}
.dt td{padding:9px 11px;border-bottom:1px solid rgba(23,32,52,.4);white-space:nowrap;cursor:default}
.dt .erow{cursor:pointer}.dt .erow:hover td{background:var(--surf2)}
.dt tr:not(.erow):hover td{background:rgba(15,24,41,.6)}
.ox{overflow-x:auto}

/* ── CONTROLS ── */
.cs{background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12px;min-height:36px}
.cb{background:transparent;border:1px solid var(--bdr2);color:var(--muted);padding:7px 13px;border-radius:8px;font-size:12px;min-height:36px}
.cb:hover{border-color:var(--acc);color:var(--txt)}
.cb.on{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.45);color:var(--acc)}

/* ── DATE NAV ── */
#dnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px}
.nbtn{width:42px;height:42px;background:var(--surf);border:1px solid var(--bdr2);border-radius:10px;color:var(--txt);font-size:20px;display:flex;align-items:center;justify-content:center}
.nbtn:disabled{opacity:.2;cursor:not-allowed}
.dpick input{background:transparent;border:none;color:var(--acc);font-size:19px;font-weight:700;font-family:var(--mono);text-align:center;cursor:pointer;width:155px;min-height:32px}
.dsub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono);text-align:center}

/* ── BADGES ── */
.bx,.bm,.bc,.bb,.ba,.bq{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:.5px}
.bx{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.32)}
.bm{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.32)}
.bc{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.32)}
.bb{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.32)}
.ba{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.32)}
.bq{background:rgba(74,98,128,.1);color:#4a6280;border:1px solid rgba(74,98,128,.32)}

/* ── AR CHIP ── */
.arc{display:inline-block;background:rgba(251,191,36,.1);color:var(--acc2);padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--mono);font-weight:700;border:1px solid rgba(251,191,36,.25);cursor:pointer;transition:all .15s}
.arc:hover{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.55)}

/* ── LEGEND ── */
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;justify-content:center}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── STAT BOXES ── */
.sbs{display:grid;gap:8px;margin-top:12px}
.sb{padding:9px 5px;border-radius:8px;text-align:center}
.sbv{font-size:19px;font-weight:700;font-family:var(--mono)}
.sbl{font-size:10px;color:var(--muted);margin-top:2px}
.sbp{font-size:10px;margin-top:1px;opacity:.7}

/* ── MISC ── */
.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.mlbl{font-size:11px;color:var(--muted)}

/* ── AR VIEW HEADER ── */
.arv-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:14px 0 18px;border-bottom:1px solid var(--bdr)}
.arv-back{background:var(--surf);border:1px solid var(--bdr2);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.arv-back:hover{border-color:var(--acc);color:var(--txt)}
.arv-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
.arv-sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:3px}
.arv-cls{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ── MODAL ── */
#moverlay{position:fixed;inset:0;background:rgba(5,8,15,.88);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
#mbox{background:var(--surf);border:1px solid var(--bdr2);border-radius:16px;max-width:460px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .2s ease;position:relative}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdr{padding:16px 18px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:16px 16px 0 0}
.mhdr h3{font-size:13px;font-weight:600;color:var(--txt);font-family:var(--mono)}
.mclose{background:transparent;border:1px solid var(--bdr2);color:var(--muted);width:30px;height:30px;border-radius:6px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mclose:hover{border-color:var(--acc);color:var(--txt)}
.mbody{padding:18px}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mfield{padding:10px 12px;background:var(--surf2);border-radius:8px;border:1px solid var(--bdr)}
.mflabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:3px}
.mfval{font-size:14px;font-weight:600;font-family:var(--mono);color:var(--txt)}
.evtlink{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.35);color:var(--acc);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;width:100%;margin-top:14px;transition:all .15s;cursor:pointer}
.evtlink:hover{background:rgba(249,115,22,.2);border-color:var(--acc)}
.tlbar{margin:14px 0}
.divider{border:none;border-top:1px solid var(--bdr);margin:14px 0}

@media(max-width:480px){
  .hctrls{width:100%}.cs,.cb{font-size:11px;padding:6px 10px}
  #cnt{padding:10px}.card{padding:12px}
  .mrow2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="upload">
  <div class="ut">
    <div class="sun">☀</div>
    <h1>Solar Flare Archive</h1>
    <p>SWPC EVENT CATALOGUE EXPLORER · OFFLINE</p>
  </div>
  <div class="dz" id="dz">
    <div style="font-size:36px;opacity:.5">📂</div>
    <h2>Drop your SWPC CSV catalogue here</h2>
    <p>or tap to browse</p>
    <div id="uerr"></div>
  </div>
  <div class="hint">Supports SWPC GEV flare catalogue CSV · Fully offline</div>
</div>

<div id="main">
  <div id="hdr">
    <div class="htitle" data-action="home">
      <span style="font-size:22px;filter:drop-shadow(0 0 8px rgba(249,115,22,.5))">☀</span>
      <div class="htitletxt"><h1>Solar Flare Archive</h1><div class="hsub" id="hsub">—</div></div>
    </div>
    <div class="hctrls">
      <select class="cs" id="fcls">
        <option value="all">All Classes</option>
        <option value="X">Class X</option><option value="M">Class M</option>
        <option value="C">Class C</option><option value="B">Class B</option><option value="A">Class A</option>
      </select>
      <select class="cs" id="far" style="max-width:130px"><option value="all">All Regions</option></select>
      <button class="cb" id="bnew">← New File</button>
    </div>
  </div>
  <div id="sbar"></div>
  <div id="tabs">
    <button class="tb on" data-tab="daily">☀ Daily</button>
    <button class="tb" data-tab="regions">⚡ Regions</button>
    <button class="tb" data-tab="stats">📊 Stats</button>
    <button class="tb" data-tab="timeline">📈 Timeline</button>
  </div>
  <div id="cnt"></div>
</div>

<!-- Event Detail Modal -->
<div id="moverlay">
  <div id="mbox"><div id="mcon"></div></div>
</div>

<input type="file" id="fi" accept=".csv,.txt" style="display:none">

<script>
/* ── CONSTANTS ── */
const CC={X:'#ef4444',M:'#fb923c',C:'#fbbf24',B:'#4ade80',A:'#22d3ee','?':'#4a6280'};
const CO=['X','M','C','B','A'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ── CSV PARSER ── */
function parseCSV(txt){
  const lines=txt.split(/\r?\n/);
  let hi=0;while(hi<lines.length&&!lines[hi].trim())hi++;
  if(hi>=lines.length)return null;
  const row=l=>{const r=[];let q=false,c='';for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;};
  return{headers:row(lines[hi]),rows:lines.slice(hi+1).filter(l=>l.trim()).map(row)};
}

/* ── COLUMN DETECTION ── */
function detect(h){
  const a=h.map(x=>String(x).toLowerCase().replace(/[\s_#\/\-]/g,''));
  const f=(...ks)=>a.findIndex(c=>ks.some(k=>c.includes(k)));
  return{
    date:f('eventdate','startdate','begindate','startdatetime','datetime','date'),
    yr:f('year','yr'),mo:f('month','mo'),da:f('day','da'),
    start:f('starttime','begintime','begin','start','btime'),
    peak:f('peaktime','maxtime','peak','max'),
    stop:f('stoptime','endtime','stop','end'),
    cls:f('goesclass','xrayclass','class','particulars','magnitude'),
    loc:f('location','loc'),
    reg:f('noaaar','noaaregion','arregion','activeregion','region','regnum','reg'),
    type:f('type','eventtype'),
    ename:f('ename','eventname','name'),
  };
}

/* ── HELPERS ── */
const getCls=s=>{if(!s)return'?';const u=String(s).trim().toUpperCase();for(const k of CO)if(u.startsWith(k))return k;return'?';};
const parseLoc=s=>{const m=String(s||'').match(/([NS])(\d+)([EW])(\d+)/i);if(!m)return null;return{lat:(m[1].toUpperCase()==='N'?1:-1)*+m[2],lon:(m[3].toUpperCase()==='W'?-1:1)*+m[4]};};
const fmtT=t=>{if(!t)return'–';const s=String(t).replace(/\D/g,'').padStart(4,'0');return s.length>=4?s.slice(0,2)+':'+s.slice(2,4):String(t);};
const fmtDate=d=>{if(!d)return d;const[y,m,dd]=d.split('-');return`${dd} ${MON[+m-1]} ${y}`;};
const tMin=t=>{if(!t||t==='–')return null;const p=t.split(':').map(Number);return p[0]*60+(p[1]||0);};
const mkUrl=f=>{
  if(!f.ename)return null;
  const ds=f.ename.replace('gev_','').split('_')[0];
  return`https://www.lmsal.com/solarsoft/latest_events_archive/events_summary/${ds}/${f.ename}.html`;
};

function parseDate(row,cm){
  if(cm.date>=0&&row[cm.date]){const v=String(row[cm.date]).trim();const m=v.match(/(\d{4})[-\/\s]?(\d{2})[-\/\s]?(\d{2})/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;}
  if(cm.yr>=0&&cm.mo>=0&&cm.da>=0){const yr=String(row[cm.yr]||'').trim(),mo=String(row[cm.mo]||'').trim().padStart(2,'0'),da=String(row[cm.da]||'').trim().padStart(2,'0');if(yr&&mo&&da&&yr.length===4)return`${yr}-${mo}-${da}`;}
  return null;
}

/* ── STATE ── */
const S={flares:[],tab:'daily',selDate:'',fClass:'all',fAR:'all',arSort:'total',modal:null,arView:null};
let _c=null;

function comp(){
  if(_c)return _c;
  const{flares,fClass,fAR}=S;
  const filt=flares.filter(f=>(fClass==='all'||f.cls===fClass)&&(fAR==='all'||f.region===fAR));
  const dates=[...new Set(filt.map(f=>f.date))].sort();
  const arm={};
  filt.forEach(f=>{if(!arm[f.region])arm[f.region]={region:f.region,total:0,X:0,M:0,C:0,B:0,A:0,'?':0,ds:new Set()};arm[f.region].total++;arm[f.region][f.cls]++;arm[f.region].ds.add(f.date);});
  const ars=Object.values(arm).map(a=>({...a,activeDays:a.ds.size}));
  const cm={X:0,M:0,C:0,B:0,A:0,'?':0};filt.forEach(f=>cm[f.cls]++);
  const tm={};filt.forEach(f=>{const mo=f.date.slice(0,7);if(!tm[mo])tm[mo]={month:mo,X:0,M:0,C:0,B:0,A:0,total:0};tm[mo][f.cls]++;tm[mo].total++;});
  const dc={};filt.forEach(f=>{dc[f.date]=(dc[f.date]||0)+1;});
  const ph={};Object.values(dc).forEach(n=>{ph[n]=(ph[n]||0)+1;});
  _c={filt,dates,ars:ars.sort((a,b)=>b.total-a.total),cm,tl:Object.values(tm).sort((a,b)=>a.month.localeCompare(b.month)),ph:Object.entries(ph).sort((a,b)=>+a[0]-+b[0]).map(([n,d])=>({n:+n,d})),dc};
  return _c;
}

function go(u){
  const nr=['fClass','fAR','flares'].some(k=>k in u);
  Object.assign(S,u);
  if(nr)_c=null;
  render();
}

/* ── SVG CHARTS ── */
function bar(data,{h=200,vals=true}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...data.map(d=>d.v),1);
  const W=480,lp=48,bp=34,tp=8,cw=W-lp,ch=h-bp-tp,bw=cw/data.length;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#172034" stroke-width=".5"/>`;
    s+=`<text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#4a6280" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  data.forEach((d,i)=>{
    const bh=Math.max((d.v/max)*ch,d.v?1:0),x=lp+i*bw+bw*.1,y=tp+ch-bh,bi=bw*.8;
    s+=`<rect x="${x}" y="${y}" width="${bi}" height="${bh}" fill="${d.c||'#f97316'}" rx="4"/>`;
    s+=`<text x="${x+bi/2}" y="${h-bp+13}" text-anchor="middle" fill="#4a6280" font-size="12" font-family="monospace" font-weight="bold">${d.l}</text>`;
    if(vals&&d.v>0)s+=`<text x="${x+bi/2}" y="${y-4}" text-anchor="middle" fill="${d.c||'#f97316'}" font-size="11" font-family="monospace">${d.v.toLocaleString()}</text>`;});
  return s+'</svg>';}

function sbar(data,cats,{h=280}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...data.map(d=>d.total),1);
  const W=640,lp=48,bp=36,tp=8,cw=W-lp,ch=h-bp-tp,bw=Math.min(cw/data.length,32),gap=cw/data.length,ev=Math.max(1,Math.round(data.length/12));
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="none">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#172034" stroke-width=".5"/>`;
    s+=`<text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#4a6280" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  data.forEach((d,i)=>{let yo=0;const x=lp+i*gap+(gap-bw)/2;cats.forEach(c=>{if(!d[c])return;const bh=(d[c]/max)*ch,y=tp+ch-yo-bh;s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${CC[c]}"/>`;yo+=bh;});
    if(i%ev===0)s+=`<text x="${x+bw/2}" y="${h-bp+13}" text-anchor="middle" fill="#4a6280" font-size="9" font-family="monospace">${d.month.slice(2)}</text>`;});
  return s+'</svg>';}

function lc(data,keys,cols,{h=180}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...keys.flatMap(k=>data.map(d=>d[k]||0)),1);
  const W=640,lp=48,bp=24,tp=8,cw=W-lp,ch=h-bp-tp;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="none">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#172034" stroke-width=".5"/><text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#4a6280" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  keys.forEach((k,ki)=>{const pts=data.map((d,i)=>`${lp+(i/(data.length-1||1))*cw},${tp+ch-((d[k]||0)/max)*ch}`).join(' ');s+=`<polyline points="${pts}" fill="none" stroke="${cols[ki]}" stroke-width="${ki===0?2.5:1.5}" stroke-linejoin="round" ${ki>0?'stroke-dasharray="4,3"':''}/>`; });
  return s+'</svg>';}

function hbar(data,{h=280,cats}={}){
  const items=data.filter(d=>d.region!=='–').slice(0,Math.min(data.length,20));
  if(!items.length)return'<div class="empty">No AR data</div>';
  const max=Math.max(...items.map(d=>d.total),1),W=460,lp=54,rp=16,tp=2,bh=h/(items.length+.5),bw=W-lp-rp,uc=cats||CO;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="xMinYMid meet">`;
  items.forEach((d,i)=>{
    const y=tp+i*bh;
    s+=`<text x="${lp-4}" y="${y+bh*.65}" text-anchor="end" fill="#c9d9f0" font-size="12" font-family="monospace" style="cursor:pointer" data-action="ar-view" data-ar="${d.region}">${d.region}</text>`;
    let xo=0;uc.forEach(c=>{if(!d[c])return;const sw=(d[c]/max)*bw;s+=`<rect x="${lp+xo}" y="${y+2}" width="${sw}" height="${bh-6}" fill="${CC[c]}" rx="2"/>`;xo+=sw;});
    s+=`<text x="${lp+xo+3}" y="${y+bh*.65}" fill="#4a6280" font-size="10" font-family="monospace">${d.total}</text>`;});
  return s+'</svg>';}

/* ── SOLAR DISK ── */
function disk(flares,sz=260){
  const R=sz*.41,cx=sz/2,cy=sz/2;
  const toXY=(lat,lon)=>({x:cx+R*Math.sin(lon*Math.PI/180)*Math.cos(lat*Math.PI/180),y:cy-R*Math.sin(lat*Math.PI/180)});
  let s=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><defs>
  <radialGradient id="dg${sz}"><stop offset="0%" stop-color="#fde68a" stop-opacity=".06"/><stop offset="100%" stop-color="#92400e" stop-opacity=".02"/></radialGradient>
  <clipPath id="dc${sz}"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath></defs>
  <circle cx="${cx}" cy="${cy}" r="${R+20}" fill="none" stroke="#f97316" stroke-width="12" opacity=".03"/>
  <circle cx="${cx}" cy="${cy}" r="${R+8}" fill="none" stroke="#fbbf24" stroke-width="5" opacity=".06"/>
  <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#dg${sz})"/>`;
  [-60,-30,0,30,60].forEach(lt=>{const yg=cy-R*Math.sin(lt*Math.PI/180),hw=R*Math.cos(lt*Math.PI/180);s+=`<line x1="${cx-hw}" y1="${yg}" x2="${cx+hw}" y2="${yg}" stroke="#f97316" stroke-width="${lt===0?.8:.35}" opacity="${lt===0?.4:.2}" clip-path="url(#dc${sz})"/>`;});
  [-60,-30,0,30,60].forEach(ln=>{const xg=cx+R*Math.sin(ln*Math.PI/180),hw=R*Math.cos(ln*Math.PI/180);s+=`<line x1="${xg}" y1="${cy-hw}" x2="${xg}" y2="${cy+hw}" stroke="#f97316" stroke-width="${ln===0?.8:.35}" opacity="${ln===0?.4:.2}" clip-path="url(#dc${sz})"/>`;});
  flares.filter(f=>f.pl).forEach(f=>{
    const{x,y}=toXY(f.pl.lat,f.pl.lon),col=CC[f.cls]||CC['?'],r=f.cls==='X'?8:f.cls==='M'?6:f.cls==='C'?4.5:3;
    s+=`<circle cx="${x}" cy="${y}" r="${r*2.2}" fill="${col}" opacity=".12"/><circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity=".9"/>`;});
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#f97316" stroke-width="1.5" opacity=".55"/>`;
  [['N',cx,cy-R-10,'middle'],['S',cx,cy+R+18,'middle'],['E',cx-R-10,cy+4,'end'],['W',cx+R+10,cy+4,'start']].forEach(([l,x,y,a])=>s+=`<text x="${x}" y="${y}" text-anchor="${a}" fill="#f97316" font-size="10" opacity=".5" font-family="monospace">${l}</text>`);
  return s+'</svg>';}

/* ── SMALL DISK (modal) ── */
function miniDisk(f,sz=160){return disk(f.pl?[f]:[],sz);}

/* ── TIMELINE BAR (modal) ── */
function tlBar(f){
  const sm=tMin(f.start),pm=tMin(f.peak),em=tMin(f.stop);
  if(sm===null)return'';
  const dur=Math.max((em||sm+30)-sm,1);
  const pp=Math.min(92,Math.max(8,8+((pm||sm)-sm)/dur*84));
  const col=CC[f.cls]||CC['?'];
  return`<div class="tlbar">
  <svg viewBox="0 0 300 44" width="100%">
    <line x1="10" y1="22" x2="290" y2="22" stroke="#172034" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="${10+pp*2.8}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
    ${em?`<line x1="${10+pp*2.8}" y1="22" x2="290" y2="22" stroke="${col}" stroke-width="2" stroke-dasharray="4,3" opacity=".4"/>`:''}
    <circle cx="10" cy="22" r="5" fill="#172034" stroke="#4a6280" stroke-width="1.5"/>
    <circle cx="${10+pp*2.8}" cy="22" r="7" fill="${col}"/>
    ${em?`<circle cx="290" cy="22" r="5" fill="#172034" stroke="#4a6280" stroke-width="1.5"/>`:''}
    <text x="10" y="42" text-anchor="middle" fill="#4a6280" font-size="10" font-family="monospace">${f.start}</text>
    <text x="${10+pp*2.8}" y="12" text-anchor="middle" fill="${col}" font-size="10" font-family="monospace" font-weight="bold">${f.peak}</text>
    ${em?`<text x="290" y="42" text-anchor="middle" fill="#4a6280" font-size="10" font-family="monospace">${f.stop}</text>`:''}
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:var(--mono);margin-top:2px">
    <span>START</span><span style="color:${col}">PEAK</span>${em?'<span>END</span>':''}
  </div></div>`;}

/* ── HTML HELPERS ── */
const bdg=c=>`<span class="b${c==='?'?'q':c.toLowerCase()}">${c}</span>`;
const arChip=(r,extra='')=>r&&r!=='–'?`<span class="arc" data-action="ar-view" data-ar="${r}" ${extra}>${r}</span>`:`<span style="color:var(--muted)">–</span>`;

/* ── AR DETAIL VIEW ── */
function rARView(region){
  const events=S.flares.filter(f=>f.region===region).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
  if(!events.length)return`<div class="empty">No events found for region ${region}</div>`;
  const cm={X:0,M:0,C:0,B:0,A:0};events.forEach(f=>{if(cm[f.cls]!==undefined)cm[f.cls]++;});
  const top=events.reduce((best,f)=>{const o=['X','M','C','B','A'];return o.indexOf(f.cls)<o.indexOf(best.cls)?f:best;},events[0]);
  const dates=[...new Set(events.map(f=>f.date))];
  const col=CC[top.cls]||CC['?'];
  const withLoc=events.filter(f=>f.pl);
  return`
  <div class="arv-hdr">
    <button class="arv-back" data-action="ar-back">← Back</button>
    <div style="flex:1">
      <div class="arv-title" style="color:${col}">Region ${region}</div>
      <div class="arv-sub">${events.length} events · ${dates.length} active days · ${fmtDate(events[0].date)} → ${fmtDate(events[events.length-1].date)}</div>
      <div class="arv-cls">${CO.filter(c=>cm[c]).map(c=>`<span class="b${c.toLowerCase()}">${cm[c]} ${c}</span>`).join('')}</div>
    </div>

  <div class="g2">
    <div class="card">
      <div class="ctit">Heliographic Positions — All Events</div>

      ${!withLoc.length?'<div style="text-align:center;font-size:11px;color:var(--muted);margin-top:8px;opacity:.6">No location data for this region</div>':''}
      <div class="leg">${CO.filter(c=>cm[c]).map(c=>`<div class="li"><div class="ld" style="background:${CC[c]};box-shadow:0 0 5px ${CC[c]}"></div>Class ${c} (${cm[c]})</div>`).join('')}</div>
    </div>
    <div class="card">
      <div class="ctit">Class Breakdown</div>

  </div>
  <div class="card">
    <div class="ctit">All Events · Region ${region}</div>
    <div class="ox"><table class="dt">
      <thead><tr><th>Date</th><th>Start UT</th><th>Peak UT</th><th>Class</th><th>Magnitude</th><th>Location</th></tr></thead>
      <tbody>${events.map(f=>`<tr class="erow" data-action="event-detail" data-ename="${f.ename||''}">
        <td style="color:var(--acc2)">${f.date}</td>
        <td style="color:var(--txt)">${f.start}</td>
        <td style="color:var(--muted)">${f.peak}</td>
        <td>${bdg(f.cls)}</td>
        <td style="color:${CC[f.cls]};font-weight:700">${f.cr||'–'}</td>
        <td style="color:${f.pl?'var(--txt)':'var(--muted)'}">${f.loc||'–'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>`;}

/* ── STATS BAR ── */
function renderSbar(){
  const{filt,dates,cm}=comp();
  const range=dates.length?`${dates[0]} → ${dates[dates.length-1]}`:'–';
  const uAR=new Set(filt.map(f=>f.region).filter(r=>r!=='–')).size;
  document.getElementById('sbar').innerHTML=[
    ['EVENTS',filt.length.toLocaleString(),'var(--txt)'],
    ['DATE RANGE',range,'var(--muted)'],
    ['ACTIVE REGIONS',uAR,'var(--txt)'],
    ...CO.slice(0,4).map(c=>[`CLASS ${c}`,(cm[c]||0).toLocaleString(),CC[c]]),
  ].map(([l,v,col])=>`<div class="sc"><div class="sl">${l}</div><div class="sv" style="color:${col}">${v}</div></div>`).join('');}

/* ── TAB: DAILY ── */
function rDaily(){

      </div>`}

  <div class="card">
    <div class="ctit">Flare Events · ${S.selDate} <span style="color:var(--muted);font-size:9px;margin-left:6px">click row for details</span></div>
    ${day.length===0?'<div class="empty">No flare events recorded on this date</div>':`
    <div class="ox"><table class="dt">

/* ── TAB: REGIONS ── */
function rRegions(){

/* ── TAB: STATS ── */
function rStats(){
  const{cm,filt,ph,ars,dc}=comp();
  const tot=filt.length,cd=CO.filter(c=>cm[c]).map(c=>({l:c,v:cm[c],c:CC[c]}));
  const top=Object.entries(dc).sort((a,b)=>b[1]-a[1])[0];
  const avg=Object.keys(dc).length?(tot/Object.keys(dc).length).toFixed(1):'–';
  const txm=ars.filter(a=>a.region!=='–'&&(a.X+a.M)>0).sort((a,b)=>(b.X+b.M)-(a.X+a.M)).slice(0,20);
  return`
  <div class="g2">
    <div class="card"><div class="ctit">Flare Class Distribution</div>${bar(cd)}
      <div class="sbs" style="grid-template-columns:repeat(${cd.length},1fr)">
        ${CO.map(c=>{const n=cm[c]||0,p=tot?(n/tot*100).toFixed(1):'0';return n?`<div class="sb" style="background:${CC[c]}12;border:1px solid ${CC[c]}30"><div class="sbv" style="color:${CC[c]}">${n.toLocaleString()}</div><div class="sbl">Class ${c}</div><div class="sbp" style="color:${CC[c]}">${p}%</div></div>`:''}).join('')}
      </div>
    </div>
    <div class="card"><div class="ctit">Flares Per Day — Distribution</div>${bar(ph.map(d=>({l:String(d.n),v:d.d,c:'#f97316'})),{h:190,vals:false})}
      <div class="sbs" style="grid-template-columns:1fr 1fr 1fr;margin-top:14px">
        ${[['Peak Day',top?`${top[1]} (${top[0]})`:'–','var(--acc)'],['Avg/Active Day',avg,'var(--txt)'],['Active Days',Object.keys(dc).length,'var(--txt)']].map(([l,v,c])=>`<div class="sb" style="background:var(--surf2);border:1px solid var(--bdr)"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono)">${l}</div><div style="font-size:12px;font-weight:700;color:${c};font-family:var(--mono);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v}</div></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card s2"><div class="ctit">Top 20 Regions — X &amp; M Class <span style="font-size:9px;opacity:.6;margin-left:4px">click name</span></div>
    ${hbar(txm,{h:Math.min(320,txm.length*17+20),cats:['X','M']})}
    <div class="leg"><div class="li"><div class="ld" style="background:${CC.X}"></div>X-class</div><div class="li"><div class="ld" style="background:${CC.M}"></div>M-class</div></div>
  </div>`;}

/* ── TAB: TIMELINE ── */
function rTimeline(){
  const{tl}=comp();
  const yrs={};tl.forEach(m=>{const y=m.month.slice(0,4);if(!yrs[y]){yrs[y]={year:y,X:0,M:0,C:0,B:0,A:0,total:0};}CO.forEach(c=>yrs[y][c]+=m[c]||0);yrs[y].total+=m.total;});

  return`
  <div class="card"><div class="ctit">Monthly Activity — Stacked by Class (${tl.length} months)</div>
    ${sbar(tl,CO,{h:300})}
    <div class="leg">${CO.map(c=>`<div class="li"><div class="ld" style="background:${CC[c]}"></div>Class ${c}</div>`).join('')}</div>
  </div>
  <div class="card"><div class="ctit">Monthly Total + Major Events Trend</div>
    ${lc(tl,['total','X','M'],['#f97316','#ef4444','#fb923c'],{h:180})}
    <div class="leg"><div class="li"><div class="ld" style="background:#f97316"></div>Total</div><div class="li" style="opacity:.7"><div class="ld" style="background:#ef4444"></div>X-class</div><div class="li" style="opacity:.7"><div class="ld" style="background:#fb923c"></div>M-class</div></div>
  </div>
  ${yr.length>1?`<div class="card"><div class="ctit">Annual Summary</div>
    <div class="ox"><table class="dt"><thead><tr><th>Year</th><th>Total</th>${CO.map(c=>`<th style="color:${CC[c]}">${c}</th>`).join('')}</tr></thead>
    <tbody>${yr.map(r=>`<tr><td style="color:var(--acc2);font-weight:700">${r.year}</td><td style="color:var(--txt);font-weight:700;font-size:14px">${r.total.toLocaleString()}</td>${CO.map(c=>`<td style="color:${r[c]>0?CC[c]:'var(--bdr2)'};font-weight:${r[c]>0?700:400}">${r[c]||'–'}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div></div>`:''}
  `;}

/* ── RENDER ── */
function render(){
  renderSbar();
  const tabs=document.getElementById('tabs');
  const cnt=document.getElementById('cnt');
  const mo=document.getElementById('moverlay');

  if(S.arView){
    tabs.style.display='none';
    cnt.innerHTML=rARView(S.arView);
  }else{
    tabs.style.display='flex';
    switch(S.tab){
      case'daily':   cnt.innerHTML=rDaily();break;
      case'regions': cnt.innerHTML=rRegions();break;
      case'stats':   cnt.innerHTML=rStats();break;
      case'timeline':cnt.innerHTML=rTimeline();break;
    }
  }

  if(S.modal){
    document.getElementById('mcon').innerHTML=rModal(S.modal);
    mo.style.display='flex';
    // Prevent body scroll when modal open
    document.body.style.overflow='hidden';
  }else{
    mo.style.display='none';
    document.body.style.overflow='';
  }
}

/* ── EVENT DELEGATION ── */
document.addEventListener('click',e=>{
  // Header home button
  if(e.target.closest('.htitle')){go({tab:'daily',arView:null,modal:null});return;}
  // Tab buttons
  const tb=e.target.closest('.tb');
  if(tb&&!S.arView){document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));tb.classList.add('on');go({tab:tb.dataset.tab});return;}
  // Overlay click-outside to close modal
  if(e.target===document.getElementById('moverlay')){go({modal:null});return;}
  // Data-action elements
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const{action,v,ar,ename}=el.dataset;
  if(action==='prev'){const{dates}=comp();const i=dates.indexOf(S.selDate);if(i>0)go({selDate:dates[i-1]});}
  else if(action==='next'){const{dates}=comp();const i=dates.indexOf(S.selDate);if(i<dates.length-1)go({selDate:dates[i+1]});}
  else if(action==='sort')go({arSort:v});
  else if(action==='ar-view'){go({arView:ar,modal:null});}
  else if(action==='ar-back'){go({arView:null,tab:'regions'});}
  else if(action==='close-modal')go({modal:null});
  else if(action==='event-detail'){
    // Find flare by ename, or by position in daily list
    let f=null;
    if(ename){f=S.flares.find(x=>x.ename===ename);}
    if(!f){
      // Try to find from row context (date + index)
      const row=el.closest('tr');
      if(row){const idx=[...row.parentNode.children].indexOf(row);const{filt}=comp();const day=filt.filter(x=>x.date===S.selDate);f=day[idx]||null;}
    }
    if(f)go({modal:f});
  }
  else if(action==='home')go({tab:'daily',arView:null,modal:null});
});

document.addEventListener('change',e=>{
  const{id,value}=e.target;
  if(id==='dpk'){const{dates}=comp();if(dates.includes(value))go({selDate:value});}
  else if(id==='fcls'){go({fClass:value});}
  else if(id==='far'){go({fAR:value});}
});

// Keyboard: Esc closes modal
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.modal)go({modal:null});});

/* ── FILE LOADING ── */
function loadFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const parsed=parseCSV(ev.target.result);
    if(!parsed){showErr('Could not parse CSV file.');return;}
    let{headers,rows}=parsed;
    let cm=detect(headers);
    const ok=cm.date>=0||(cm.yr>=0&&cm.mo>=0&&cm.da>=0);
    if(!ok&&rows.length){const cm2=detect(rows[0]);if(cm2.date>=0||(cm2.yr>=0&&cm2.mo>=0&&cm2.da>=0)){headers=rows[0];rows=rows.slice(1);cm=cm2;}}
    const flares=[];
    rows.forEach(row=>{
      if(String(row[0]||'').startsWith(':'))return;
      if(cm.type>=0){const t=String(row[cm.type]||'').toUpperCase().trim();if(t&&!['XRA','FLA',''].includes(t)&&!t.includes('X'))return;}
      const date=parseDate(row,cm);if(!date)return;
      const cr=cm.cls>=0?String(row[cm.cls]||'').trim():'';
      const cls=getCls(cr);if(cls==='?'&&!cr)return;
      const loc=cm.loc>=0?String(row[cm.loc]||'').trim():'';
      const reg=cm.reg>=0?String(row[cm.reg]||'').replace(/^0+/,'').trim():'';
      const start=cm.start>=0?fmtT(row[cm.start]):'–';
      const peak=cm.peak>=0?fmtT(row[cm.peak]):'–';
      const stop=cm.stop>=0?fmtT(row[cm.stop]):'–';
      const ename=cm.ename>=0?String(row[cm.ename]||'').trim():'';
      flares.push({date,cr,cls,loc,pl:parseLoc(loc),region:reg||'–',start,peak,stop,ename});
    });
    if(!flares.length){showErr('No flare events found. Check CSV column names.');return;}
    flares.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    const ars=[...new Set(flares.map(f=>f.region).filter(r=>r!=='–'))].sort((a,b)=>+a-+b);
    document.getElementById('far').innerHTML='<option value="all">All Regions</option>'+ars.map(r=>`<option value="${r}">${r}</option>`).join('');
    document.getElementById('hsub').textContent=`${file.name} · ${flares.length.toLocaleString()} events`;
    const dates=[...new Set(flares.map(f=>f.date))].sort();
    Object.assign(S,{flares,selDate:dates[dates.length-1],fClass:'all',fAR:'all',tab:'daily',modal:null,arView:null});
    _c=null;
    document.getElementById('upload').style.display='none';
    document.getElementById('main').style.display='flex';
    render();
  };
  reader.readAsText(file);}

function showErr(msg){document.getElementById('uerr').innerHTML=`<div class="err">${msg}</div>`;}

/* ── STATIC EVENTS ── */
const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)loadFile(f);});
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f)loadFile(f);fi.value='';});
document.getElementById('bnew').addEventListener('click',()=>{
  document.getElementById('main').style.display='none';
  document.getElementById('upload').style.display='flex';
  document.getElementById('uerr').innerHTML='';
  Object.assign(S,{flares:[],modal:null,arView:null});_c=null;
});
</script>
