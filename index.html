<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Solar Flare Archive Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surf:#181d28;--surf2:#1d2233;
  --bdr:#252b3a;--bdr2:#2e3649;
  --txt:#dce6f5;--muted:#64748b;
  --acc:#f97316;--acc2:#fbbf24;
  --mono:'Courier New','Menlo',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
button{cursor:pointer;font-family:inherit;transition:all .15s}
select,input{font-family:inherit}select{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
#upload{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:22px}
.ut{text-align:center}.sun-icon{font-size:54px;filter:drop-shadow(0 0 22px rgba(249,115,22,.55))}
.ut h1{font-size:29px;font-weight:700;color:var(--acc);margin-top:12px;letter-spacing:-1px}
.ut p{color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:5px;letter-spacing:1px}
.dz{background:var(--surf);border:2px dashed var(--bdr2);border-radius:14px;padding:46px 30px;text-align:center;cursor:pointer;width:100%;max-width:440px;transition:all .2s}
.dz:hover,.dz.over{border-color:var(--acc);background:rgba(249,115,22,.04)}
.dz-icon{font-size:38px;opacity:.4;margin-bottom:12px}.dz h2{font-size:15px;font-weight:600}.dz p{color:var(--muted);font-size:12px;margin-top:5px}
.hint{color:var(--muted);font-size:11px;font-family:var(--mono);text-align:center;max-width:380px;line-height:1.9;opacity:.7}
.errmsg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#ef4444;padding:9px 16px;border-radius:8px;font-size:12px;margin-top:12px}
#main{display:none;flex-direction:column;min-height:100vh}
#hdr{background:var(--surf);border-bottom:1px solid var(--bdr);padding:11px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.htitle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-user-select:none;flex-shrink:0}
.htitle:hover h1{color:var(--acc2)}.htitle h1{font-size:16px;font-weight:700;color:var(--acc);letter-spacing:-.5px;transition:color .15s}
.hsub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.hright{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.arsw{position:relative}
.arsw input{background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);padding:7px 12px 7px 30px;border-radius:8px;font-size:12px;width:155px;outline:none;transition:border-color .15s}
.arsw input:focus{border-color:var(--acc)}.arsw input::placeholder{color:var(--muted)}
.arsw .sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
#ardd{display:none;position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--surf);border:1px solid var(--bdr2);border-radius:9px;z-index:300;max-height:210px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.aro{padding:9px 13px;cursor:pointer;font-family:var(--mono);font-size:12px;color:var(--txt);border-bottom:1px solid var(--bdr)}
.aro:last-child{border-bottom:none}.aro:hover{background:var(--surf2);color:var(--acc2)}.oc{font-size:10px;color:var(--muted);margin-left:8px}
#sbar{display:flex;overflow-x:auto;border-bottom:1px solid var(--bdr)}
.sc{flex:0 0 auto;padding:8px 16px;border-right:1px solid var(--bdr)}
.sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-family:var(--mono)}
.sv{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:2px;white-space:nowrap}
#tabs{display:flex;gap:2px;padding:8px 20px 0;border-bottom:1px solid var(--bdr2);overflow-x:auto}
.tb{padding:8px 16px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--muted);font-size:13px;white-space:nowrap;min-height:36px}
.tb.on{background:var(--surf);color:var(--txt);border-color:var(--bdr2);font-weight:600;margin-bottom:-1px}
#cnt{padding:18px;flex:1;max-width:1200px;width:100%;margin:0 auto}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px 20px;margin-bottom:14px}
.ctit{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);margin-bottom:13px}
.ctit small{font-size:9px;opacity:.55;margin-left:6px;text-transform:none;letter-spacing:0;font-weight:400}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.g2{grid-template-columns:1fr}}.s2{grid-column:1/-1}
.dt{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
.dt th{padding:8px 11px;text-align:left;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--bdr2);font-weight:500;white-space:nowrap}
.dt td{padding:9px 11px;border-bottom:1px solid rgba(37,43,58,.5);white-space:nowrap}
.dt .er{cursor:pointer}.dt .er:hover td{background:var(--surf2)}
.dt tr:not(.er):hover td{background:rgba(29,34,51,.5)}.ox{overflow-x:auto}
.cs{background:var(--surf2);border:1px solid var(--bdr2);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12px;min-height:36px;outline:none}
.cb{background:transparent;border:1px solid var(--bdr2);color:var(--muted);padding:7px 13px;border-radius:8px;font-size:12px;min-height:36px}
.cb:hover{border-color:var(--acc);color:var(--txt)}.cb.on{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.45);color:var(--acc)}
#dnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px}
.nbtn{width:42px;height:42px;background:var(--surf);border:1px solid var(--bdr2);border-radius:10px;color:var(--txt);font-size:20px;display:flex;align-items:center;justify-content:center}
.nbtn:disabled{opacity:.2;cursor:not-allowed}
.dpick input{background:transparent;border:none;color:var(--acc);font-size:18px;font-weight:700;font-family:var(--mono);text-align:center;cursor:pointer;width:155px;min-height:32px}
.dsub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono);text-align:center}
.bx,.bm,.bc,.bb,.ba,.bq{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-family:var(--mono);font-weight:700}
.bx{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.bm{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.3)}
.bc{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.bb{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.ba{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.3)}
.bq{background:rgba(100,116,139,.1);color:#64748b;border:1px solid rgba(100,116,139,.3)}
.arc{display:inline-block;background:rgba(251,191,36,.08);color:var(--acc2);padding:2px 7px;border-radius:4px;font-size:11px;font-family:var(--mono);font-weight:700;border:1px solid rgba(251,191,36,.22);cursor:pointer;transition:all .15s}
.arc:hover{background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.5)}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sbs{display:grid;gap:8px;margin-top:12px}.sb{padding:9px 5px;border-radius:8px;text-align:center}
.sbv{font-size:19px;font-weight:700;font-family:var(--mono)}.sbl{font-size:10px;color:var(--muted);margin-top:2px}.sbp{font-size:10px;margin-top:1px;opacity:.7}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}.mlbl{font-size:11px;color:var(--muted)}
.divider{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.arv-hdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bdr)}
.arv-back{background:var(--surf);border:1px solid var(--bdr2);color:var(--muted);padding:8px 14px;border-radius:8px;font-size:12px;flex-shrink:0}
.arv-back:hover{border-color:var(--acc);color:var(--txt)}
.arv-num{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.arv-sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.arv-cls{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
#moverlay{position:fixed;inset:0;background:rgba(8,10,16,.9);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
#mbox{background:var(--surf);border:1px solid var(--bdr2);border-radius:14px;max-width:450px;width:100%;max-height:92vh;overflow-y:auto;animation:suUp .2s ease}
@keyframes suUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdr{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:1;border-radius:14px 14px 0 0}
.mhdr h3{font-size:12px;font-weight:600;color:var(--muted);font-family:var(--mono)}
.mclose{background:transparent;border:1px solid var(--bdr2);color:var(--muted);width:28px;height:28px;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center}
.mclose:hover{border-color:var(--acc);color:var(--txt)}.mbody{padding:18px}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mfield{padding:10px 12px;background:var(--surf2);border-radius:8px;border:1px solid var(--bdr)}
.mflabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:3px}
.mfval{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--txt)}
.evtlink{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.3);color:var(--acc);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;width:100%;margin-top:14px;transition:all .15s}
.evtlink:hover{background:rgba(249,115,22,.16);border-color:var(--acc)}.tlbar{margin:12px 0}
@media(max-width:480px){.hright{width:100%}.cs,.cb{font-size:11px;padding:6px 10px}#cnt{padding:10px}.card{padding:12px}.mrow2{grid-template-columns:1fr}.arsw input{width:120px}}
</style>
</head>
<body>
<div id="upload">
  <div class="ut"><div class="sun-icon">☀</div><h1>Solar Flare Archive</h1><p>SWPC · GEV EVENT CATALOGUE EXPLORER</p></div>
  <div class="dz" id="dz"><div class="dz-icon">📂</div><h2>Drop your SWPC CSV catalogue here</h2><p>or tap to browse</p><div id="uerr"></div></div>
  <div class="hint">Supports SWPC GEV flare catalogue CSV · Fully offline</div>
</div>
<div id="main">
  <div id="hdr">
    <div class="htitle" data-action="home">
      <span style="font-size:20px;filter:drop-shadow(0 0 8px rgba(249,115,22,.5))">☀</span>
      <div><h1>Solar Flare Archive</h1><div class="hsub" id="hsub">—</div></div>
    </div>
    <div class="hright">
      <div class="arsw"><span class="sico">🔍</span><input type="text" id="arsi" placeholder="Search region..." autocomplete="off" spellcheck="false"><div id="ardd"></div></div>
      <select class="cs" id="fcls">
        <option value="all">All Classes</option><option value="X">Class X</option><option value="M">Class M</option><option value="C">Class C</option><option value="B">Class B</option><option value="A">Class A</option>
      </select>
      <button class="cb" id="bnew">New File</button>
    </div>
  </div>
  <div id="sbar"></div>
  <div id="tabs">
    <button class="tb on" data-tab="daily">☀ Daily</button>
    <button class="tb" data-tab="regions">⚡ Regions</button>
    <button class="tb" data-tab="stats">📊 Stats</button>
    <button class="tb" data-tab="timeline">📈 Timeline</button>
  </div>
  <div id="cnt"></div>
</div>
<div id="moverlay"><div id="mbox"><div id="mcon"></div></div></div>
<input type="file" id="fi" accept=".csv,.txt" style="display:none">
<script>
const CC={X:'#ef4444',M:'#fb923c',C:'#fbbf24',B:'#4ade80',A:'#22d3ee','?':'#64748b'};
const CO=['X','M','C','B','A'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseCSV(txt){
  const lines=txt.split(/\r?\n/);let hi=0;
  while(hi<lines.length&&!lines[hi].trim())hi++;
  if(hi>=lines.length)return null;
  const row=l=>{const r=[];let q=false,c='';for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;};
  return{headers:row(lines[hi]),rows:lines.slice(hi+1).filter(l=>l.trim()).map(row)};
}

function detect(h){
  const a=h.map(x=>String(x).toLowerCase().replace(/[\s_#\/\-]/g,''));
  const f=(...ks)=>a.findIndex(c=>ks.some(k=>c.includes(k)));
  return{
    date:f('eventdate','startdate','begindate','datetime','date'),
    yr:f('year','yr'),mo:f('month','mo'),da:f('day','da'),
    start:f('starttime','begintime','begin','start','btime'),
    peak:f('peaktime','maxtime','peak','max'),
    stop:f('stoptime','endtime','stop','end'),
    cls:f('goesclass','xrayclass','class','particulars','magnitude'),
    loc:f('location','loc'),
    reg:f('noaaar','noaaregion','arregion','activeregion','region','regnum','reg'),
    type:f('type','eventtype'),
    ename:f('ename','eventname','name'),
  };
}

const getCls=s=>{if(!s)return'?';const u=String(s).trim().toUpperCase();for(const k of CO)if(u.startsWith(k))return k;return'?';};
const parseLoc=s=>{const m=String(s||'').match(/([NS])(\d+)([EW])(\d+)/i);if(!m)return null;return{lat:(m[1].toUpperCase()==='N'?1:-1)*+m[2],lon:(m[3].toUpperCase()==='W'?-1:1)*+m[4]};};
const fmtT=t=>{if(!t)return'--';const s=String(t).replace(/\D/g,'').padStart(4,'0');return s.length>=4?s.slice(0,2)+':'+s.slice(2,4):String(t);};
const fmtDate=d=>{if(!d)return d;const[y,m,dd]=d.split('-');return`${dd} ${MON[+m-1]} ${y}`;};
const tMin=t=>{if(!t||t==='--')return null;const[h,m]=(t+':00').split(':').map(Number);return h*60+m;};
const clsVal=f=>{const b={X:5,M:4,C:3,B:2,A:1,'?':.5};const n=parseFloat(String(f.cr||'1').replace(/[A-Za-z]/g,''))||1;return(b[f.cls]||.5)+Math.min(n,9)/10*.85;};
const mkUrl=f=>{if(!f.ename)return null;const ds=f.ename.replace('gev_','').split('_')[0];return`https://www.lmsal.com/solarsoft/latest_events_archive/events_summary/${ds.slice(0,4)}/${ds.slice(4,6)}/${ds.slice(6,8)}/${f.ename}/index.html`;};

function parseDate(row,cm){
  if(cm.date>=0&&row[cm.date]){const v=String(row[cm.date]).trim();const m=v.match(/(\d{4})[-\/\s]?(\d{2})[-\/\s]?(\d{2})/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;}
  if(cm.yr>=0&&cm.mo>=0&&cm.da>=0){const yr=String(row[cm.yr]||'').trim(),mo=String(row[cm.mo]||'').trim().padStart(2,'0'),da=String(row[cm.da]||'').trim().padStart(2,'0');if(yr&&mo&&da&&yr.length===4)return`${yr}-${mo}-${da}`;}
  return null;
}

const S={flares:[],tab:'daily',selDate:'',fClass:'all',arSort:'total',modal:null,arView:null};
let _c=null;

function comp(){
  if(_c)return _c;
  const{flares,fClass}=S;
  const filt=flares.filter(f=>fClass==='all'||f.cls===fClass);
  const dates=[...new Set(filt.map(f=>f.date))].sort();
  const arm={};
  filt.forEach(f=>{if(!arm[f.region])arm[f.region]={region:f.region,total:0,X:0,M:0,C:0,B:0,A:0,'?':0,ds:new Set()};arm[f.region].total++;arm[f.region][f.cls]++;arm[f.region].ds.add(f.date);});
  const ars=Object.values(arm).map(a=>({...a,activeDays:a.ds.size}));
  const cm={X:0,M:0,C:0,B:0,A:0,'?':0};filt.forEach(f=>cm[f.cls]++);
  const tm={};filt.forEach(f=>{const mo=f.date.slice(0,7);if(!tm[mo])tm[mo]={month:mo,X:0,M:0,C:0,B:0,A:0,total:0};tm[mo][f.cls]++;tm[mo].total++;});
  const dc={};filt.forEach(f=>{dc[f.date]=(dc[f.date]||0)+1;});
  const ph={};Object.values(dc).forEach(n=>{ph[n]=(ph[n]||0)+1;});
  _c={filt,dates,ars:ars.sort((a,b)=>b.total-a.total),cm,tl:Object.values(tm).sort((a,b)=>a.month.localeCompare(b.month)),ph:Object.entries(ph).sort((a,b)=>+a[0]-+b[0]).map(([n,d])=>({n:+n,d})),dc};
  return _c;
}

function go(u){const nr=['fClass','flares'].some(k=>k in u);Object.assign(S,u);if(nr)_c=null;render();}

/* ── CHARTS ── */
function barChart(data,{h=190,vals=true}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...data.map(d=>d.v),1),W=480,lp=44,bp=32,tp=8,cw=W-lp,ch=h-bp-tp,bw=cw/data.length;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="xMidYMid meet">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#252b3a" stroke-width=".5"/>`;
    s+=`<text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  data.forEach((d,i)=>{const bh=Math.max((d.v/max)*ch,d.v?1:0),x=lp+i*bw+bw*.12,y=tp+ch-bh,bi=bw*.76;
    s+=`<rect x="${x}" y="${y}" width="${bi}" height="${bh}" fill="${d.c||'#f97316'}" rx="4" opacity=".9"/>`;
    s+=`<text x="${x+bi/2}" y="${h-bp+12}" text-anchor="middle" fill="#64748b" font-size="12" font-family="monospace" font-weight="bold">${d.l}</text>`;
    if(vals&&d.v>0)s+=`<text x="${x+bi/2}" y="${y-4}" text-anchor="middle" fill="${d.c||'#f97316'}" font-size="11" font-family="monospace">${d.v.toLocaleString()}</text>`;});
  return s+'</svg>';}

function stackedBar(data,cats,{h=260}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...data.map(d=>d.total),1),W=640,lp=44,bp=30,tp=8,cw=W-lp,ch=h-bp-tp,bw=Math.min(cw/data.length,28),gap=cw/data.length,ev=Math.max(1,Math.round(data.length/12));
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="none">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#252b3a" stroke-width=".5"/>`;
    s+=`<text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  data.forEach((d,i)=>{let yo=0;const x=lp+i*gap+(gap-bw)/2;
    cats.forEach(c=>{if(!d[c])return;const bh=(d[c]/max)*ch,y=tp+ch-yo-bh;s+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${CC[c]}" opacity=".9"/>`;yo+=bh;});
    if(i%ev===0)s+=`<text x="${x+bw/2}" y="${h-bp+12}" text-anchor="middle" fill="#64748b" font-size="9" font-family="monospace">${d.month.slice(2)}</text>`;});
  return s+'</svg>';}

function lineChart(data,keys,cols,{h=170}={}){
  if(!data.length)return'<div class="empty">No data</div>';
  const max=Math.max(...keys.flatMap(k=>data.map(d=>d[k]||0)),1),W=640,lp=44,bp=20,tp=8,cw=W-lp,ch=h-bp-tp;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="none">`;
  for(let i=0;i<=4;i++){const v=Math.round(max*i/4),y=tp+ch-(i/4)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W}" y2="${y}" stroke="#252b3a" stroke-width=".5"/>`;
    s+=`<text x="${lp-4}" y="${y+4}" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">${v>=1000?Math.round(v/100)/10+'k':v}</text>`;}
  keys.forEach((k,ki)=>{const pts=data.map((d,i)=>`${lp+(i/(data.length-1||1))*cw},${tp+ch-((d[k]||0)/max)*ch}`).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="${cols[ki]}" stroke-width="${ki===0?2:1.5}" stroke-linejoin="round" ${ki>0?'stroke-dasharray="4,3"':''}/>`; });
  return s+'</svg>';}

function horizBar(data,{h=260,cats}={}){
  const items=data.filter(d=>d.region!=='--').slice(0,Math.min(data.length,20));
  if(!items.length)return'<div class="empty">No AR data</div>';
  const max=Math.max(...items.map(d=>d.total),1),W=460,lp=52,rp=16,tp=2,bh=h/(items.length+.5),bw=W-lp-rp,uc=cats||CO;
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="xMinYMid meet">`;
  items.forEach((d,i)=>{const y=tp+i*bh;
    s+=`<text x="${lp-5}" y="${y+bh*.67}" text-anchor="end" fill="#dce6f5" font-size="12" font-family="monospace" style="cursor:pointer" data-action="ar-view" data-ar="${d.region}">${d.region}</text>`;
    let xo=0;uc.forEach(c=>{if(!d[c])return;const sw=(d[c]/max)*bw;s+=`<rect x="${lp+xo}" y="${y+2}" width="${sw}" height="${bh-5}" fill="${CC[c]}" rx="2" opacity=".9"/>`;xo+=sw;});
    s+=`<text x="${lp+xo+4}" y="${y+bh*.67}" fill="#64748b" font-size="10" font-family="monospace">${d.total}</text>`;});
  return s+'</svg>';}

/* ── STEM CHART ── */
function stemChart(events){
  if(!events.length)return'<div class="empty">No events</div>';
  const W=640,lp=44,rp=20,tp=24,bp=44,h=220,cw=W-lp-rp,ch=h-tp-bp;
  const ts=events.map(e=>{const t=new Date(`${e.date}T${e.start&&e.start.includes(':')&&e.start!=='--'?e.start:'00:00'}:00Z`).getTime();return isNaN(t)?new Date(e.date+'T00:00:00Z').getTime():t;});
  const t0=Math.min(...ts),t1=Math.max(...ts),span=Math.max(t1-t0,86400000);
  let s=`<svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="none">`;
  ['A','B','C','M','X'].forEach((c,i)=>{const y=tp+ch-((i+1)/5)*ch;
    s+=`<line x1="${lp}" y1="${y}" x2="${W-rp}" y2="${y}" stroke="#252b3a" stroke-width="${i===2?1:.5}" stroke-dasharray="${i===2?'':'4,4'}"/>`;
    s+=`<text x="${lp-5}" y="${y+4}" text-anchor="end" fill="${CC[c]}" font-size="10" font-family="monospace" font-weight="bold">${c}</text>`;});
  s+=`<line x1="${lp}" y1="${tp+ch}" x2="${W-rp}" y2="${tp+ch}" stroke="#2e3649" stroke-width="1.2"/>`;
  events.forEach((ev,ii)=>{const x=lp+((ts[ii]-t0)/span)*cw,v=clsVal(ev),y2=tp+ch-(v/5)*ch,col=CC[ev.cls]||CC['?'],r=ev.cls==='X'?6:ev.cls==='M'?5:4;
    s+=`<line x1="${x}" y1="${tp+ch}" x2="${x}" y2="${y2+r}" stroke="${col}" stroke-width="1.5" opacity=".4"/>`;
    s+=`<circle cx="${x}" cy="${y2}" r="${r}" fill="${col}" opacity=".88" style="cursor:pointer" data-action="event-detail" data-ename="${ev.ename||''}"/>`;});
  const step=Math.max(1,Math.floor(events.length/7));
  for(let i=0;i<events.length;i+=step){const x=lp+((ts[i]-t0)/span)*cw;
    s+=`<text x="${x}" y="${h-bp+14}" text-anchor="middle" fill="#64748b" font-size="9" font-family="monospace">${events[i].date.slice(5)}</text>`;
    s+=`<line x1="${x}" y1="${tp+ch}" x2="${x}" y2="${tp+ch+4}" stroke="#2e3649" stroke-width="1"/>`;}
  return s+'</svg>';}

/* ── SOLAR DISK — spherical elliptical longitude lines ── */
function solarDisk(flares,sz=260){
  const R=sz*.41,cx=sz/2,cy=sz/2,PI=Math.PI;
  const toXY=(lat,lon)=>({x:cx+R*Math.sin(lon*PI/180)*Math.cos(lat*PI/180),y:cy-R*Math.sin(lat*PI/180)});
  let s=`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><defs>
  <radialGradient id="dg${sz}" cx="38%" cy="35%" r="65%"><stop offset="0%" stop-color="#fde68a" stop-opacity=".05"/><stop offset="100%" stop-color="#92400e" stop-opacity=".01"/></radialGradient>
  <clipPath id="dc${sz}"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath></defs>
  <circle cx="${cx}" cy="${cy}" r="${R+22}" fill="none" stroke="#f97316" stroke-width="14" opacity=".022"/>
  <circle cx="${cx}" cy="${cy}" r="${R+9}" fill="none" stroke="#fbbf24" stroke-width="5" opacity=".04"/>
  <circle cx="${cx}" cy="${cy}" r="${R}" fill="url(#dg${sz})"/>`;
  /* latitude lines — horizontal chords (correct orthographic projection) */
  [-60,-30,0,30,60].forEach(lat=>{const yg=cy-R*Math.sin(lat*PI/180),hw=R*Math.cos(lat*PI/180);
    s+=`<line x1="${cx-hw}" y1="${yg}" x2="${cx+hw}" y2="${yg}" stroke="#f97316" stroke-width="${lat===0?1:.4}" opacity="${lat===0?.45:.2}" clip-path="url(#dc${sz})"/>`;});
  /* longitude lines — true ellipses for spherical appearance */
  [-60,-30,0,30,60].forEach(lon=>{
    if(lon===0){s+=`<line x1="${cx}" y1="${cy-R}" x2="${cx}" y2="${cy+R}" stroke="#f97316" stroke-width="1" opacity=".45" clip-path="url(#dc${sz})"/>`;}
    else{const rx=R*Math.abs(Math.sin(lon*PI/180));s+=`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${R}" fill="none" stroke="#f97316" stroke-width=".4" opacity=".2" clip-path="url(#dc${sz})"/>`;} });
  flares.filter(f=>f.pl).forEach(f=>{const{x,y}=toXY(f.pl.lat,f.pl.lon),col=CC[f.cls]||CC['?'],r=f.cls==='X'?8:f.cls==='M'?6:f.cls==='C'?4.5:3;
    s+=`<circle cx="${x}" cy="${y}" r="${r*2}" fill="${col}" opacity=".1"/>`;
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${col}" opacity=".9"/>`;});
  s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#f97316" stroke-width="1.5" opacity=".5"/>`;
  [['N',cx,cy-R-10,'middle'],['S',cx,cy+R+18,'middle'],['E',cx-R-12,cy+4,'end'],['W',cx+R+12,cy+4,'start']].forEach(([l,x,y,a])=>
    s+=`<text x="${x}" y="${y}" text-anchor="${a}" fill="#f97316" font-size="10" opacity=".5" font-family="monospace">${l}</text>`);
  return s+'</svg>';}

/* ── TIMELINE BAR ── */
function tlBar(f){
  const sm=tMin(f.start),pm=tMin(f.peak),em=tMin(f.stop);
  if(sm===null)return'';
  const dur=Math.max((em||sm+30)-sm,1),pp=Math.min(90,Math.max(10,10+((pm||sm)-sm)/dur*80)),col=CC[f.cls]||CC['?'];
  return`<div class="tlbar"><svg viewBox="0 0 300 40" width="100%">
<line x1="10" y1="20" x2="290" y2="20" stroke="#252b3a" stroke-width="2.5" stroke-linecap="round"/>
<line x1="10" y1="20" x2="${10+pp*2.8}" y2="20" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
${em?`<line x1="${10+pp*2.8}" y1="20" x2="290" y2="20" stroke="${col}" stroke-width="2" stroke-dasharray="4,3" opacity=".35"/>`:''}
<circle cx="10" cy="20" r="4" fill="#252b3a" stroke="#64748b" stroke-width="1.5"/>
<circle cx="${10+pp*2.8}" cy="20" r="6" fill="${col}"/>
${em?`<circle cx="290" cy="20" r="4" fill="#252b3a" stroke="#64748b" stroke-width="1.5"/>`:''}
<text x="10" y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="monospace">${f.start}</text>
<text x="${10+pp*2.8}" y="11" text-anchor="middle" fill="${col}" font-size="9" font-family="monospace" font-weight="bold">${f.peak}</text>
${em?`<text x="290" y="38" text-anchor="middle" fill="#64748b" font-size="9" font-family="monospace">${f.stop}</text>`:''}
</svg><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:var(--mono)"><span>START</span><span style="color:${col}">PEAK</span>${em?'<span>END</span>':''}</div></div>`;}

const bdg=c=>`<span class="b${c==='?'?'q':c.toLowerCase()}">${c}</span>`;
const arChip=(r,extra='')=>r&&r!=='--'?`<span class="arc" data-action="ar-view" data-ar="${r}" ${extra}>${r}</span>`:`<span style="color:var(--muted)">--</span>`;

  </div>
</div>
<div class="card s2"><div class="ctit">Top 20 Regions &mdash; X &amp; M Class<small>click name to explore</small></div>
  ${horizBar(txm,{h:Math.min(300,txm.length*16+20),cats:['X','M']})}
  <div class="leg"><div class="li"><div class="ld" style="background:#ef4444"></div>X-class</div><div class="li"><div class="ld" style="background:#fb923c"></div>M-class</div></div>
</div>`;}

/* ── TIMELINE ── */
function rTimeline(){
  const{tl}=comp();
  const yrs={};tl.forEach(m=>{const y=m.month.slice(0,4);if(!yrs[y]){yrs[y]={year:y,X:0,M:0,C:0,B:0,A:0,total:0};}CO.forEach(c=>yrs[y][c]+=m[c]||0);yrs[y].total+=m.total;});
  const yr=Object.values(yrs).sort((a,b)=>a.year.localeCompare(b.year));
  return`
<div class="card"><div class="ctit">Monthly Activity &mdash; Stacked by Class (${tl.length} months)</div>
  ${stackedBar(tl,CO,{h:260})}<div class="leg">${CO.map(c=>`<div class="li"><div class="ld" style="background:${CC[c]}"></div>Class ${c}</div>`).join('')}</div>
</div>
<div class="card"><div class="ctit">Monthly Total + Major Events Trend</div>
  ${lineChart(tl,['total','X','M'],['#f97316','#ef4444','#fb923c'])}
  <div class="leg"><div class="li"><div class="ld" style="background:#f97316"></div>Total</div><div class="li" style="opacity:.7"><div class="ld" style="background:#ef4444"></div>X-class</div><div class="li" style="opacity:.7"><div class="ld" style="background:#fb923c"></div>M-class</div></div>
</div>
${yr.length>1?`<div class="card"><div class="ctit">Annual Summary</div>
  <div class="ox"><table class="dt"><thead><tr><th>Year</th><th>Total</th>${CO.map(c=>`<th style="color:${CC[c]}">${c}</th>`).join('')}</tr></thead>
  <tbody>${yr.map(r=>`<tr><td style="color:var(--acc2);font-weight:700">${r.year}</td><td style="color:var(--txt);font-weight:700;font-size:14px">${r.total.toLocaleString()}</td>${CO.map(c=>`<td style="color:${r[c]>0?CC[c]:'var(--bdr2)'};font-weight:${r[c]>0?700:400}">${r[c]||'--'}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div></div>`:''}`;}

/* ── RENDER ── */
function render(){
  renderSbar();
  const tabs=document.getElementById('tabs'),cnt=document.getElementById('cnt'),mo=document.getElementById('moverlay');
  if(S.arView){tabs.style.display='none';cnt.innerHTML=rARView(S.arView);}
  else{tabs.style.display='flex';switch(S.tab){case'daily':cnt.innerHTML=rDaily();break;case'regions':cnt.innerHTML=rRegions();break;case'stats':cnt.innerHTML=rStats();break;case'timeline':cnt.innerHTML=rTimeline();break;}}
  if(S.modal){document.getElementById('mcon').innerHTML=rModal(S.modal);mo.style.display='flex';document.body.style.overflow='hidden';}
  else{mo.style.display='none';document.body.style.overflow='';}
}

/* ── AR SEARCH ── */
function updateARSearch(q){
  const dd=document.getElementById('ardd');
  if(!q.trim()||!S.flares.length){dd.style.display='none';return;}
  const allARs=[...new Set(S.flares.map(f=>f.region).filter(r=>r!=='--'))].sort((a,b)=>+a-+b);
  const matches=allARs.filter(r=>r.includes(q.trim())).slice(0,12);
  if(!matches.length){dd.style.display='none';return;}
  const cnt={};S.flares.forEach(f=>{if(f.region!=='--')cnt[f.region]=(cnt[f.region]||0)+1;});
  dd.innerHTML=matches.map(r=>`<div class="aro" data-action="ar-search-pick" data-ar="${r}">${r}<span class="oc">${cnt[r]||0} events</span></div>`).join('');
  dd.style.display='block';
}

/* ── EVENTS ── */
document.addEventListener('click',e=>{
  const opt=e.target.closest('[data-action="ar-search-pick"]');
  if(opt){go({arView:opt.dataset.ar,modal:null});document.getElementById('arsi').value='';document.getElementById('ardd').style.display='none';return;}
  if(!e.target.closest('.arsw'))document.getElementById('ardd').style.display='none';
  if(e.target.closest('.htitle')){go({tab:'daily',arView:null,modal:null});return;}
  const tb=e.target.closest('.tb');
  if(tb&&!S.arView){document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));tb.classList.add('on');go({tab:tb.dataset.tab});return;}
  if(e.target===document.getElementById('moverlay')){go({modal:null});return;}
  const el=e.target.closest('[data-action]');if(!el)return;
  const{action,v,ar,ename}=el.dataset;
  if(action==='prev'){const{dates}=comp();const i=dates.indexOf(S.selDate);if(i>0)go({selDate:dates[i-1]});}
  else if(action==='next'){const{dates}=comp();const i=dates.indexOf(S.selDate);if(i<dates.length-1)go({selDate:dates[i+1]});}
  else if(action==='sort')go({arSort:v});
  else if(action==='ar-view')go({arView:ar,modal:null});
  else if(action==='ar-back')go({arView:null,tab:'regions'});
  else if(action==='close-modal')go({modal:null});
  else if(action==='event-detail'){const f=ename?S.flares.find(x=>x.ename===ename):null;if(f)go({modal:f});}
  else if(action==='home')go({tab:'daily',arView:null,modal:null});
});

document.addEventListener('change',e=>{
  if(e.target.id==='dpk'){const{dates}=comp();if(dates.includes(e.target.value))go({selDate:e.target.value});}
  else if(e.target.id==='fcls')go({fClass:e.target.value});
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(S.modal)go({modal:null});else document.getElementById('ardd').style.display='none';}});

document.getElementById('arsi').addEventListener('input',e=>updateARSearch(e.target.value));
document.getElementById('arsi').addEventListener('keydown',e=>{if(e.key==='Enter'){const first=document.querySelector('[data-action="ar-search-pick"]');if(first){go({arView:first.dataset.ar,modal:null});e.target.value='';document.getElementById('ardd').style.display='none';}}});

/* ── LOAD FILE ── */
function loadFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    const parsed=parseCSV(ev.target.result);
    if(!parsed){showErr('Could not parse CSV file.');return;}
    let{headers,rows}=parsed;let cm=detect(headers);
    const ok=cm.date>=0||(cm.yr>=0&&cm.mo>=0&&cm.da>=0);
    if(!ok&&rows.length){const cm2=detect(rows[0]);if(cm2.date>=0||(cm2.yr>=0&&cm2.mo>=0&&cm2.da>=0)){headers=rows[0];rows=rows.slice(1);cm=cm2;}}
    const flares=[];
    rows.forEach(row=>{
      if(String(row[0]||'').startsWith(':'))return;
      if(cm.type>=0){const t=String(row[cm.type]||'').toUpperCase().trim();if(t&&!['XRA','FLA',''].includes(t)&&!t.includes('X'))return;}
      const date=parseDate(row,cm);if(!date)return;
      const cr=cm.cls>=0?String(row[cm.cls]||'').trim():'';
      const cls=getCls(cr);if(cls==='?'&&!cr)return;
      const loc=cm.loc>=0?String(row[cm.loc]||'').trim():'';
      const reg=cm.reg>=0?String(row[cm.reg]||'').replace(/^0+/,'').trim():'';
      const start=cm.start>=0?fmtT(row[cm.start]):'--';
      const peak=cm.peak>=0?fmtT(row[cm.peak]):'--';
      const stop=cm.stop>=0?fmtT(row[cm.stop]):'--';
      const ename=cm.ename>=0?String(row[cm.ename]||'').trim():'';
      flares.push({date,cr,cls,loc,pl:parseLoc(loc),region:reg||'--',start,peak,stop,ename});
    });
    if(!flares.length){showErr('No flare events found. Check CSV column names.');return;}
    flares.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    document.getElementById('hsub').textContent=`${file.name} · ${flares.length.toLocaleString()} events`;
    const dates=[...new Set(flares.map(f=>f.date))].sort();
    Object.assign(S,{flares,selDate:dates[dates.length-1],fClass:'all',tab:'daily',modal:null,arView:null});
    _c=null;
    document.getElementById('upload').style.display='none';
    document.getElementById('main').style.display='flex';
    render();
  };
  reader.readAsText(file);
}

function showErr(msg){document.getElementById('uerr').innerHTML=`<div class="errmsg">${msg}</div>`;}

const dz=document.getElementById('dz'),fi=document.getElementById('fi');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)loadFile(f);});
fi.addEventListener('change',e=>{const f=e.target.files[0];if(f)loadFile(f);fi.value='';});
document.getElementById('bnew').addEventListener('click',()=>{
  document.getElementById('main').style.display='none';
  document.getElementById('upload').style.display='flex';
  document.getElementById('uerr').innerHTML='';
  Object.assign(S,{flares:[],modal:null,arView:null});_c=null;
});
</script>
</body>
